<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bullard Business Execution is coming soon.">
  <title>Bullard Business Execution | Coming Soon</title>
  <style>
    :root {
      --ink: #10202b;
      --ink-soft: #345364;
      --muted: #60717c;
      --paper: #f7f5f0;
      --white: #fffefa;
      --line: #d8d4ca;
      --steel: #9aadb9;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% 8%, rgba(154, 173, 185, .35), transparent 34rem),
        linear-gradient(180deg, var(--white), var(--paper));
      color: var(--ink);
      display: grid;
      font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      place-items: center;
      padding: clamp(28px, 6vw, 72px) 22px;
    }
    main { max-width: 980px; text-align: center; width: 100%; }
    .logo-wrap {
      background: var(--white);
      border: 1px solid rgba(16, 32, 43, .14);
      box-shadow: 0 24px 80px rgba(16, 32, 43, .16);
      margin: 0 auto clamp(34px, 5vw, 54px);
      max-width: 860px;
      padding: clamp(20px, 5vw, 54px);
    }
    img {
      display: block;
      height: auto;
      margin: 0 auto;
      max-width: min(732px, 100%);
      width: 100%;
    }
    .eyebrow {
      color: var(--ink-soft);
      display: block;
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 800;
      letter-spacing: .2em;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    h1 {
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-size: clamp(48px, 10vw, 92px);
      font-weight: 400;
      letter-spacing: -.06em;
      line-height: .96;
      margin: 0 0 22px;
    }
    p {
      color: var(--muted);
      font-size: clamp(18px, 2.4vw, 22px);
      margin: 0 auto;
      max-width: 680px;
    }
    .line { background: var(--line); height: 1px; margin: clamp(32px, 5vw, 50px) auto 0; max-width: 420px; }
    .domain {
      color: var(--ink-soft);
      display: block;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .16em;
      margin-top: 22px;
      text-transform: uppercase;
    }
    @media (max-width: 560px) {
      body { padding-left: 18px; padding-right: 18px; }
      .logo-wrap { padding: 18px; }
      .eyebrow { letter-spacing: .15em; }
      p { font-size: 18px; }
      .domain { font-size: 13px; line-height: 1.5; }
    }
  </style>
</head>
<body>
  <main aria-labelledby="coming-soon-title">
    <div class="logo-wrap">
      <img src="https://kbb915.github.io/bbe-temp-site/assets/bbe-logo.png" alt="Bullard Business Execution">
    </div>
    <span class="eyebrow">Bullard Business Execution</span>
    <h1 id="coming-soon-title">Coming Soon</h1>
    <p>Organizational performance and execution work for leaders who need movement, accountability, and measurable outcomes.</p>
    <div class="line" aria-hidden="true"></div>
    <span class="domain">bullardbusinessexecution.com</span>
  </main>
</body>
</html>
