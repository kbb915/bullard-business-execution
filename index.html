<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bullard Business Execution is coming soon.">
  <title>Bullard Business Execution | Coming Soon</title>
  <style>
    :root {
      --ink: #10202b;
      --ink-soft: #345364;
      --muted: #60717c;
      --white: #ffffff;
      --line: #d8d4ca;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--white);
      color: var(--ink);
      display: grid;
      font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      place-items: center;
      padding: clamp(18px, 3.8vw, 38px) 20px;
    }
    main { max-width: 820px; text-align: center; width: 100%; }
    .logo-wrap {
      background: var(--white);
      margin: 0 auto clamp(18px, 3vw, 30px);
      max-width: 560px;
      padding: 0;
    }
    img {
      display: block;
      height: auto;
      margin: 0 auto;
      max-width: min(560px, 86vw);
      width: 100%;
    }
    .eyebrow {
      color: var(--ink-soft);
      display: block;
      font-size: clamp(12px, 1.7vw, 14px);
      font-weight: 800;
      letter-spacing: .18em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    h1 {
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
      font-size: clamp(42px, 7vw, 70px);
      font-weight: 400;
      letter-spacing: -.06em;
      line-height: .96;
      margin: 0 0 14px;
    }
    p {
      color: var(--muted);
      font-size: clamp(17px, 2vw, 20px);
      line-height: 1.55;
      margin: 0 auto;
      max-width: 650px;
    }
    .line { background: var(--line); height: 1px; margin: clamp(18px, 3vw, 28px) auto 0; max-width: 360px; }
    .domain {
      color: var(--ink-soft);
      display: block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .14em;
      margin-top: 15px;
      text-transform: uppercase;
    }
    @media (max-width: 560px) {
      body { padding: 18px 16px; }
      .logo-wrap { margin-bottom: 18px; }
      img { max-width: min(440px, 90vw); }
      .eyebrow { letter-spacing: .14em; }
      h1 { font-size: clamp(40px, 12vw, 54px); }
      p { font-size: 17px; }
      .domain { font-size: 12px; line-height: 1.45; }
    }
    @media (max-height: 680px) {
      body { align-items: start; padding-top: 18px; padding-bottom: 18px; }
      .logo-wrap { max-width: 450px; margin-bottom: 16px; }
      img { max-width: min(450px, 72vw); }
      h1 { font-size: clamp(38px, 8vh, 56px); margin-bottom: 10px; }
      p { font-size: 17px; }
      .line { margin-top: 16px; }
      .domain { margin-top: 12px; }
    }
  </style>
</head>
<body>
  <main aria-labelledby="coming-soon-title">
    <div class="logo-wrap">
      <img src="https://kbb915.github.io/bbe-temp-site/assets/bbe-logo.png" alt="Bullard Business Execution">
    </div>
    <span class="eyebrow">Bullard Business Execution</span>
    <h1 id="coming-soon-title">Coming Soon</h1>
    <p>Organizational performance and execution work for leaders who need movement, accountability, and measurable outcomes.</p>
    <div class="line" aria-hidden="true"></div>
    <span class="domain">bullardbusinessexecution.com</span>
  </main>
</body>
</html>
