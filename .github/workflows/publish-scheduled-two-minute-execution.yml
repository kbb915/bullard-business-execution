name: Publish scheduled Two-Minute Execution messages

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: scheduled-two-minute-execution
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Generate eligible messages
        run: node scripts/build-two-minute-execution.mjs

      - name: Validate generated site
        run: node scripts/validate-two-minute-execution.mjs

      - name: Commit newly eligible messages
        id: commit
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- two-minute-execution sitemap.xml)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add two-minute-execution sitemap.xml
          git commit -m "Publish scheduled Two-Minute Execution messages"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Request the GitHub Pages build
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${REPOSITORY}/pages/builds"
